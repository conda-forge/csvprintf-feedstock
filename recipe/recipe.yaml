context:
  version: "1.3.4"

package:
  name: csvprintf
  version: ${{ version }}

source:
  url: https://github.com/archiecobbs/csvprintf/archive/${{ version }}.tar.gz
  sha256: dff2ecf046bac822bc34fc8a452cecae3d22abeb85a9ac950dafdec4fedf0db2

build:
  number: 0
  skip: win

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - autoconf
    - automake
    - make
  host:
    - libiconv
    - libxslt

tests:
  - script:
      - csvprintf -h

about:
  license: Apache-2.0
  license_file: COPYING
  summary: Simple CSV file parser for the UNIX command line
  homepage: https://github.com/archiecobbs/csvprintf
  repository: https://github.com/archiecobbs/csvprintf

extra:
  recipe-maintainers:
    - danielnachun
